#云编译公用核心
name: WRT-CORE

on:
  workflow_call:
    inputs:
      WRT_CONFIG:
        required: true
        type: string
      WRT_THEME:
        required: true
        type: string
      WRT_NAME:
        required: true
        type: string
      WRT_SSID:
        required: true
        type: string
      WRT_WORD:
        required: true
        type: string
      WRT_IP:
        required: true
        type: string
      WRT_PW:
        required: true
        type: string
      WRT_REPO:
        required: true
        type: string
      WRT_BRANCH:
        required: true
        type: string
      WRT_SOURCE:
        required: true
        type: string
      WRT_PACKAGE:
        required: false
        type: string
      WRT_TEST:
        required: false
        type: string

env:
  GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
  WRT_CONFIG: ${{inputs.WRT_CONFIG}}
  WRT_THEME: ${{inputs.WRT_THEME}}
  WRT_NAME: ${{inputs.WRT_NAME}}
  WRT_SSID: ${{inputs.WRT_SSID}}
  WRT_WORD: ${{inputs.WRT_WORD}}
  WRT_IP: ${{inputs.WRT_IP}}
  WRT_PW: ${{inputs.WRT_PW}}
  WRT_REPO: ${{inputs.WRT_REPO}}
  WRT_BRANCH: ${{inputs.WRT_BRANCH}}
  WRT_SOURCE: ${{inputs.WRT_SOURCE}}
  WRT_PACKAGE: ${{inputs.WRT_PACKAGE}}
  WRT_TEST: ${{inputs.WRT_TEST}}

jobs:
  core:
    name: ${{inputs.WRT_SOURCE}}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Projects
        uses: actions/checkout@main

      - name: Initialization Environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo rm -rf \
            /opt/az \
            /opt/ghc \
            /opt/google \
            /opt/hostedtoolcache \
            /opt/microsoft \
            /opt/pipx \
            /usr/share/dotnet \
            /usr/share/swift \
            /usr/local/.ghcup \
            /usr/local/julia* \
            /usr/local/lib/android \
            /usr/local/lib/node_modules \
            /usr/local/share/boost \
            /usr/local/share/chromium \
            /usr/local/share/edge_driver \
            /usr/local/share/gecko_driver \
            /usr/local/share/powershell \
            /usr/local/share/vcpkg

          if command -v docker >/dev/null 2>&1; then
            sudo docker system prune -af --volumes
          fi

          if swapon --show=NAME --noheadings | grep -qx "/mnt/swapfile"; then
            sudo swapoff /mnt/swapfile
            sudo rm -f /mnt/swapfile
          fi

          sudo -E apt -yqq purge firefox
          sudo -E apt -yqq update
          sudo -E apt -yqq autoremove --purge
          sudo -E apt -yqq autoclean
          sudo -E apt -yqq clean
          sudo -E apt -yqq install dos2unix libfuse-dev
          sudo bash -c 'bash <(curl -sL https://build-scripts.immortalwrt.org/init_build_environment.sh)'
          sudo -E systemctl daemon-reload
          sudo -E timedatectl set-timezone "Asia/Shanghai"

          sudo mkdir -p /mnt/build_wrt
          sudo chown $USER:$USER /mnt/build_wrt
          sudo ln -s /mnt/build_wrt $GITHUB_WORKSPACE/wrt

      - name: Initialization Values
        run: |
          echo "WRT_DATE=$(TZ=UTC-8 date +"%y.%m.%d-%H.%M.%S")" >> $GITHUB_ENV
          echo "WRT_MARK=${GITHUB_REPOSITORY%%/*}" >> $GITHUB_ENV
          echo "WRT_INFO=${WRT_SOURCE%%/*}" >> $GITHUB_ENV
          echo "WRT_TARGET=$(grep -m 1 -oP '^CONFIG_TARGET_\K[\w]+(?=\=y)' ./Config/$WRT_CONFIG.txt)" >> $GITHUB_ENV
          echo "WRT_WIFI=wifi-yes" >> $GITHUB_ENV
          echo "WRT_KVER=none" >> $GITHUB_ENV
          echo "WRT_LIST=none" >> $GITHUB_ENV

      - name: Clone Code
        run: |
          git clone --depth=1 --single-branch --branch $WRT_BRANCH $WRT_REPO ./wrt/

          cd ./wrt/ && echo "WRT_HASH=$(git log -1 --pretty=format:'%h')" >> $GITHUB_ENV

          # GitHub Action 移除国内下载源
          PROJECT_MIRRORS_FILE="./scripts/projectsmirrors.json"
          if [ -f "$PROJECT_MIRRORS_FILE" ]; then
            sed -i '/.cn\//d; /tencent/d; /aliyun/d' "$PROJECT_MIRRORS_FILE"
          fi

      - name: Check Scripts
        run: |
          find ./ -maxdepth 3 -type f -iregex ".*\(txt\|sh\)$" -exec dos2unix {} \; -exec chmod +x {} \;

      - name: Restore Build Cache
        id: restore-build-cache
        if: env.WRT_TEST != 'true'
        uses: actions/cache/restore@v5
        with:
          key: ${{env.WRT_CONFIG}}-${{env.WRT_INFO}}-full-${{env.WRT_HASH}}
          restore-keys: |
            ${{env.WRT_CONFIG}}-${{env.WRT_INFO}}-full-
            ${{env.WRT_CONFIG}}-${{env.WRT_INFO}}-warm-${{env.WRT_HASH}}
            ${{env.WRT_CONFIG}}-${{env.WRT_INFO}}-warm-
            ${{env.WRT_CONFIG}}-${{env.WRT_INFO}}-${{env.WRT_HASH}}
            ${{env.WRT_CONFIG}}-${{env.WRT_INFO}}
          path: |
            ./wrt/.ccache
            ./wrt/staging_dir/host*
            ./wrt/staging_dir/tool*

      - name: Detect Build Cache
        id: build-cache-state
        if: env.WRT_TEST != 'true'
        run: |
          cache_present=0
          if [ -d "./wrt/staging_dir/host" ] || [ -d "./wrt/staging_dir/hostpkg" ] || compgen -G "./wrt/staging_dir/toolchain-*" >/dev/null; then
            cache_present=1
          fi

          echo "cache_present=${cache_present}" >> "$GITHUB_OUTPUT"

      - name: Update Caches
        if: env.WRT_TEST != 'true' && steps.build-cache-state.outputs.cache_present == '1'
        run: |
          if [ -d "./wrt/staging_dir" ]; then
            find "./wrt/staging_dir" -type d -name "stamp" -not -path "*target*" | while read -r DIR; do
              find "$DIR" -type f -exec touch {} +
            done

            mkdir -p ./wrt/tmp && echo "1" > ./wrt/tmp/.build

            echo "toolchain skiped done!"
          else
            echo "caches missed!"
          fi

      - name: Update Feeds
        run: |
          cd ./wrt/

          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Custom Packages
        run: |
          cd ./wrt/package/

          $GITHUB_WORKSPACE/Scripts/Packages.sh
          $GITHUB_WORKSPACE/Scripts/Handles.sh

      - name: Custom Settings
        run: |
          cd ./wrt/

          if [[ "${WRT_CONFIG,,}" == *"test"* ]]; then
            cat $GITHUB_WORKSPACE/Config/$WRT_CONFIG.txt >> .config
          else
            cat $GITHUB_WORKSPACE/Config/$WRT_CONFIG.txt $GITHUB_WORKSPACE/Config/GENERAL.txt >> .config
          fi

          $GITHUB_WORKSPACE/Scripts/Settings.sh

          make defconfig -j$(nproc) && make clean -j$(nproc)

      - name: Prewarm Build Cache
        if: env.WRT_TEST != 'true' && steps.build-cache-state.outputs.cache_present != '1'
        run: |
          cd ./wrt/

          make tools/install toolchain/install -j$(nproc)

      - name: Save Warm Build Cache
        if: env.WRT_TEST != 'true' && steps.build-cache-state.outputs.cache_present != '1'
        uses: actions/cache/save@v5
        with:
          key: ${{env.WRT_CONFIG}}-${{env.WRT_INFO}}-warm-${{env.WRT_HASH}}
          path: |
            ./wrt/.ccache
            ./wrt/staging_dir/host*
            ./wrt/staging_dir/tool*

      - name: Download Packages
        if: env.WRT_TEST != 'true'
        run: |
          cd ./wrt/
          
          # 用户空间增加emmc解密脚本及rtl9303控制程序
          git clone --depth=1 https://github.com/yjy116/files
          
          # 赋予 files 目录下所有文件可执行权限
          chmod -R +x files

          for FILE in \
            files/etc/rc.local \
            files/lib/aqr/aq-fw-download \
            files/lib/aqr/aqr-v5.6.7.cld \
            files/lib/aqr/init.sh \
            files/lib/firmware/ath11k/IPQ8074/hw2.0/board-2.bin \
            files/lib/firmware/ath11k/QCN9074/hw1.0/amss.bin \
            files/lib/firmware/ath11k/QCN9074/hw1.0/m3.bin \
            files/lib/firmware/ath11k/QCN9074/hw1.0/board-2.bin \
            files/lib/firmware/ath11k/QCN9074/hw1.0/board-2.working.bin \
            files/lib/firmware/ccpu.elf.leucadia \
            files/lib/mmc/data_key \
            files/lib/mmc/init.sh \
            files/lib/rtl/init.sh \
            files/lib/rtl/usrApp
          do
            if [ ! -s "$FILE" ]; then
              echo "::error::Missing required CR1000A overlay file: $FILE"
              exit 1
            fi
          done

          # Use the known-good CR1000A QCN9074 BDF as the runtime board-2.bin.
          cp -f files/lib/firmware/ath11k/QCN9074/hw1.0/board-2.working.bin \
            files/lib/firmware/ath11k/QCN9074/hw1.0/board-2.bin
          echo "QCN9074 board-2.bin: $(sha256sum files/lib/firmware/ath11k/QCN9074/hw1.0/board-2.bin | cut -d ' ' -f 1)"

          # Start RTL9303 only after spidev is present and keep usrApp alive.
          cat > files/lib/rtl/init.sh <<'EOF'
          #!/bin/ash
          set -eu

          cp -f /lib/libubus.so.* /lib/libubus.so 2>/dev/null || true
          cp -f /lib/libubox.so.* /lib/libubox.so 2>/dev/null || true

          retry=0
          while [ ! -e /dev/spidev1.0 ] && [ "$retry" -lt 30 ]; do
            sleep 1
            retry=$((retry + 1))
          done

          if [ ! -e /dev/spidev1.0 ]; then
            logger -t cr1000a-rtl "missing /dev/spidev1.0, RTL9303 init aborted"
            exit 1
          fi

          ln -sf /dev/spidev1.0 /dev/spidev32765.0

          control_fifo=/tmp/control_rtl9303.fifo
          rm -f "$control_fifo"
          mkfifo "$control_fifo"
          tail -f "$control_fifo" | /lib/rtl/usrApp &

          logger -t cr1000a-rtl "RTL9303 usrApp started through /dev/spidev1.0"
          exit 0
          EOF

          sed -i 's/^          //' files/lib/rtl/init.sh
          chmod +x files/lib/rtl/init.sh
          grep -q "/dev/spidev1.0" files/lib/rtl/init.sh

          # CR1000A's PCIe QCN9024 currently exposes a reliable 5GHz profile
          # with the available BDF. Keep radio2 usable instead of forcing 6GHz.
          mkdir -p files/etc/uci-defaults
          cat > files/etc/uci-defaults/99-cr1000a-wireless <<EOF
          #!/bin/sh
          . /lib/functions.sh

          [ "\$(board_name)" = "verizon,cr1000a" ] || exit 0

          if ! uci -q get wireless.radio2 >/dev/null; then
            logger -t cr1000a-wireless "radio2 is missing, skip QCN 5GHz fallback"
            exit 0
          fi

          uci -q batch <<EOT
          set wireless.radio2.band='5g'
          set wireless.radio2.channel='36'
          set wireless.radio2.htmode='HE80'
          set wireless.radio2.country='CN'
          set wireless.radio2.disabled='0'
          set wireless.default_radio2=wifi-iface
          set wireless.default_radio2.device='radio2'
          set wireless.default_radio2.network='lan'
          set wireless.default_radio2.mode='ap'
          set wireless.default_radio2.ssid='${WRT_SSID}-QCN5G'
          set wireless.default_radio2.encryption='psk2+ccmp'
          delete wireless.default_radio2.ieee80211w
          set wireless.default_radio2.key='${WRT_WORD}'
          commit wireless
          EOT
          logger -t cr1000a-wireless "radio2 configured as QCN 5GHz fallback on channel 36/HE80"
          exit 0
          EOF

          sed -i 's/^          //' files/etc/uci-defaults/99-cr1000a-wireless
          chmod +x files/etc/uci-defaults/99-cr1000a-wireless
          grep -q "wireless.radio2.band='5g'" files/etc/uci-defaults/99-cr1000a-wireless
          
          make download -j$(nproc)

      - name: Compile Firmware
        if: env.WRT_TEST != 'true'
        run: |
          cd ./wrt/

          make -j$(nproc) || make -j1 V=s

      - name: Save Full Build Cache
        if: env.WRT_TEST != 'true' && success() && steps.restore-build-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          key: ${{env.WRT_CONFIG}}-${{env.WRT_INFO}}-full-${{env.WRT_HASH}}
          path: |
            ./wrt/.ccache
            ./wrt/staging_dir/host*
            ./wrt/staging_dir/tool*

      - name: Machine Information
        run: |
          cd ./wrt/

          echo "======================="
          lscpu | grep -E "name|Core|Thread"
          echo "======================="
          df -h
          echo "======================="
          du -h --max-depth=1
          echo "======================="

      - name: Package Firmware
        run: |
          cd ./wrt/ && mkdir ./upload/

          cp -f ./.config ./upload/Config-"$WRT_CONFIG"-"$WRT_INFO"-"$WRT_BRANCH"-"$WRT_DATE".txt

          if [[ $WRT_TEST != 'true' ]]; then
            echo "WRT_KVER=$(find ./bin/targets/ -type f -name "*.manifest" -exec grep -oP '^kernel - \K[\d\.]+' {} \;)" >> $GITHUB_ENV
            echo "WRT_LIST=$(find ./bin/targets/ -type f -name "*.manifest" -exec grep -oP '^luci-(app|theme)[^ ]*' {} \; | tr '\n' ' ')" >> $GITHUB_ENV

            find ./bin/targets/ -iregex ".*\(buildinfo\|json\|sha256sums\|packages\)$" -exec rm -rf {} +

            for FILE in $(find ./bin/targets/ -type f -iname "*$WRT_TARGET*") ; do
              EXT=$(basename $FILE | cut -d '.' -f 2-)
              NAME=$(basename $FILE | cut -d '.' -f 1 | grep -io "\($WRT_TARGET\).*")
              NEW_FILE="$NAME"-"$WRT_INFO"-"$WRT_BRANCH"-"$WRT_WIFI"-"$WRT_DATE"."$EXT"
              mv -f $FILE ./upload/$NEW_FILE
            done

            find ./bin/targets/ -type f -exec mv -f {} ./upload/ \;

            make clean -j$(nproc)
          fi

      - name: Release Firmware
        uses: softprops/action-gh-release@master
        with:
          tag_name: ${{env.WRT_CONFIG}}-${{env.WRT_INFO}}-${{env.WRT_BRANCH}}-${{env.WRT_DATE}}
          files: ./wrt/upload/*.*
          body: |

            源码：${{env.WRT_REPO}}
            分支：${{env.WRT_BRANCH}}
            提交：${{env.WRT_HASH}}

            配置：${{env.WRT_CONFIG}}
            平台：${{env.WRT_TARGET}}

            登录地址：${{env.WRT_IP}}
            登录密码：${{env.WRT_PW}}

            WIFI名称：${{env.WRT_SSID}}
            WIFI密码：${{env.WRT_WORD}}

            内核版本：${{env.WRT_KVER}}
            插件列表：${{env.WRT_LIST}}
