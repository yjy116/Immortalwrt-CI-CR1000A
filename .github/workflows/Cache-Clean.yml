name: Cache-Clean

on:
  workflow_dispatch:

permissions:
  actions: write
  contents: read

concurrency:
  group: cache-clean
  cancel-in-progress: false

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete All Actions Caches
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          echo "Caches before cleanup:"
          gh cache list --repo "$GH_REPO" --limit 1000 || true

          echo "Deleting all GitHub Actions caches in $GH_REPO..."
          gh cache delete --all --repo "$GH_REPO" --succeed-on-no-caches

          echo "Caches after cleanup:"
          gh cache list --repo "$GH_REPO" --limit 1000 || true
