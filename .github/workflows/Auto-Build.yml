name: Auto-Build

on:
  # 每 10 天 00:00 北京时间自动执行
  schedule:
    - cron: "0 16 */10 * *"
  # 支持手动触发
  workflow_dispatch:

permissions: write-all

jobs:
  check_updates:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
    steps:
      - name: Check upstream updates (last 10 days)
        id: check
        env:
          SOURCE: VIKINGYFY/immortalwrt
          BRANCH: main
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          echo "Checking commits for $SOURCE on branch $BRANCH in the last 10 days..."

          since=$(date -u -d '10 days ago' +'%Y-%m-%dT%H:%M:%SZ')
          echo "Since: $since"

          resp=$(curl -fsSL \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$SOURCE/commits?sha=$BRANCH&since=$since")

          if echo "$resp" | grep -q '"sha"'; then
            echo "Found new commits. Will build."
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          else
            echo "No new commits in the last 10 days. Skip build."
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          fi

  clean:
    needs: check_updates
    if: needs.check_updates.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Delete old Releases and Workflows
        uses: ophub/delete-releases-workflows@main
        with:
          gh_token: ${{ secrets.GITHUB_TOKEN }}
          delete_releases: true
          releases_keep_latest: 2
          delete_tags: true
          delete_workflows: true
          workflows_keep_day: 0

  trigger_build:
    needs: [check_updates, clean]
    if: needs.check_updates.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch CR1000A workflow
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          echo "Triggering CR1000A workflow_dispatch..."

          curl -fsSL -X POST \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/CR1000A.yml/dispatches \
            -d '{"ref":"main","inputs":{"PACKAGE":"","TEST":"false"}}'
